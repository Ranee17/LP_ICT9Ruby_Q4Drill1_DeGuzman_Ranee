<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRILL 1</title> 

<style>
    body{
        font-family:'Courier New', Courier, monospace;
        text-align: center;
        margin-top: 80px;
        background-color:rgba(14, 14, 14, 0.521) ;
    }

    .container{
        background: white;
        padding: 20px;
        width: 400px;
        margin: auto;
        border: 1px solid #ccc;
    }

    input{
        padding: 6px;
        width:80%;
        margin-bottom: 10px;
    }

    button {
        padding: 8px 15px;
    }

    output {
        margin-top: 15px;
        text-align: left;
    }


</style>

</head> 
<body>

    <div class="container">
        <h2> Electricity Consumption Classifier </h2>
        
        <img src="https://img.freepik.com/premium-vector/bolt-icon-vector-illustration-design_1948-8308.jpg" style="width: 50%;">
        
    
        

        <input type="number" id="kw" placeholder="Enter kilowat per hour">
        <br>

        <button onclick="evaluateKW()">Consumption Classification</button>

            <div class="output">
                     <p id="status"> </p>
                    <p id="CON"> </p>
              </div>

     </div>

<script>
        function evaluateKW()
{
    var kw = document.getElementById("kw").value;

    if(kw === ""){
        alert("Please enter kilowatt.");
        return;
    }

    kw = Number(kw);
    var status = "";

    if(kw >= 301){
        status = "Status: High Consumption";
    }else{
        status = "Status: Low/Average Consumption";
    }

    var CON = "";

    if(kw > 500){
        CON = "Very High";
    }else if(kw >= 301){
        CON = "High";
    }else if (kw >=201){
        Con = "Average";
    }else if(kw >= 101){
        CON = "Low";
    }else{
        CON = "Lifeline";
    }

    var remark = "";

    switch(CON){

        case "Very High":
        remark="|Heavy electricity usage";
        break;
        
        case "High":
        remark="| Higher electricity usage ";
        break;

        case "Average":
        remark="| Typical electricity usage";
        break;

        case "Low":
        remark="| Normal residential rate";
        break;

        case "Lifeline":
        remark="| Discounted electricity rates";
        break;
    }

    document.getElementById("status").innerHTML = status;
    document.getElementById("CON").innerHTML = "Category: " + CON + " " + remark;
}

     </script>

</body>
</html>
